<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>A HTML Static Webpage</title>
</head>

<body>
    <header>
        <table width="100%">
            <tr>
                <td><strong>Static Webpage</strong></td>
                <td align="right">
                    <nav>
                        <a href="#home">Home</a> |
                        <a href="#projects">Projects</a> |
                        <a href="#about">About us</a>
                    </nav>
                </td>
            </tr>
        </table>
        <br><br>
        <hr>
    </header>

    <!-- Hero section -->
    <section id="home">
        <center>
            <h1>Home</h1>
            <p>Visits the products below</p>
        </center>
    </section>

    <br><br>
    <hr>
    <table width="100%">
        <tr>
            <td width="70%">
                <!-- Main section -->

                <main id="projects">
                    <article>
                        <form>
                            <fieldset>
                                <legend>Form Demonstration</legend>
                                <p>
                                    <label for="name">Full Name: </label>
                                    <input type="text" id="name" name="username" required placeholder="John Doe">
                                </p>
                                <p>
                                    <label for="email">Email Address: </label>
                                    <input type="email" id="email" name="useremail" required>
                                </p>
                                <p>
                                    <label for="Gender"> Gender </label>
                                    <input type="radio" name="gender"> Male
                                    <input type="radio" name="gender"> Female

                                </p>
                                <p>
                                    <label for="Department">Department </label>
                                    <select id="Department" name="userdept">
                                        <option value="general">CSE</option>
                                        <option value="technical">CSM</option>
                                        <option value="technical">CSD</option>
                                    </select>
                                </p>
                                <p>
                                    <label for="message">Feedback</label><br>
                                    <textarea id="message" name="usermessage" rows="10" cols="30"
                                        placeholder="Type your Feedback in here..."></textarea>
                                </p>
                                <p>
                                    <input type="submit" value="Submit Form Data">
                                </p>
                            </fieldset>
                        </form>
                    </article>
                </main>
            </td>
            <td>
                <article>
                    <aside>
                        <center>
                            <h1>
                                About ANITS
                            </h1>
                            <ul>
                                <li> Near Sanghivalasa </li>
                                <li> Established in 2001 </li>
                                <li> Holds NAAC A+</li>
                            </ul>
                        </center>
                    </aside>
                </article>
            </td>
        </tr>
    </table>
    <footer>
        <section>
            <center>
                Anil Neerukonda Institute of Technology & Sciences
            </center>
        </section>
    </footer>
</body>

</html>
